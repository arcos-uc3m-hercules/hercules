# Used URI for internal items definition
URI = imss://

# Block size (in KB)
BLOCK_SIZE = 512

# Used mount point in the client side
MOUNT_POINT = /mnt/hercules/

# Path where the Hercules project is located
HERCULES_PATH = /home/tester004/gesanche/hercules

# Port listening in the metadata node service
METADATA_PORT = 75000

# Port listening in the data node service
DATA_PORT =     85000

# Total number of data nodes
NUM_DATA_SERVERS = 1

# Total number of metadadata nodes
NUM_META_SERVERS = 1

# Total number of client nodes
NUM_NODES_FOR_CLIENTS = 1

# Total number of clients per node
NUM_CLIENTS_PER_NODE = 1

# [1, 0]: Cslient process are share resources with data nodes
ATTACHED = 0

# [1, 0]: Enables malleability functions
MALLEABILITY = 0
UPPER_BOUND_MALLEABILITY = 0
LOWER_BOUND_MALLEABILITY = 0

# File containing a list of nodes serving as data nodes
DATA_HOSTFILE = /home/tester004/gesanche/hercules/bash/tests/malleability/c3/ior/data_hostfile 

# Number of threads attending data requests
THREAD_POOL = 1

# Maximum size used by the data nodes
STORAGE_SIZE = 0 # No limit

# File containing a list of nodes serving as metadata nodes
METADATA_HOSTFILE = /home/tester004/gesanche/hercules/bash/tests/malleability/c3/ior/meta_hostfile

# [none, all]: Debug mode (none or all)
DEBUG_LEVEL = none

# [RR, BUCKETS, HASH, CRC16b, CRC64b, LOCAL] Distribution policy (RR by default)
POLICY = RR

# Path where Hercules is going to copy data from memory to disk (checkpoint).
HERCULES_CHECKPOINT_PATH =
# ./HerculesCheckpoint/

# Path where Hercules is going to do a persistent copy of the files (snapshot).
HERCULES_SNAPSHOT_PATH = 
#./HerculesSnapshot

# Colon-separated list of directories to be copy from Hercules to disk, 
# for example /mnt/hercules/directory1/:/mnt/hercules/directory2/
SNAPSHOT_PATHS_LIST= 
#/mnt/hercules/

# Colon-separated list of directories to be excluded from the CHECKPOINT_PATH LISTS.
IGNORE_PATHS_LIST=

# PREFETCH (MiB)
PREFETCH_SIZE = 0

